name: build-and-push-image

# Build the Docker image in GitHub's cloud and push it to GHCR, so the VPS only
# ever PULLS the finished image (no heavy build on the server).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  # GHCR image names must be lowercase.
  IMAGE: ghcr.io/rocky4554/embeddings_service

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
